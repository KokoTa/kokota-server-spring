#
##下面这些内容是为了让MyBatis映射
##指定Mybatis的Mapper文件
#mybatis.mapper-locations=classpath:mappers/*xml
##指定Mybatis的实体目录
#mybatis.type-aliases-package=com.example.kokotaserver.mybatis.entity
#
## 应用服务 WEB 访问端口
#server.port=8080
#

spring:
  application:
    name: kokota-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yupi
    username: root
    password: 123123

server:
  port: 8080

mybatis-plus:
  configuration:
    # 禁用自动驼峰转换，因为数据库字段已是驼峰写法
    map-underscore-to-camel-case: false
