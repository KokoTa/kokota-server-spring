#
##下面这些内容是为了让MyBatis映射
##指定Mybatis的Mapper文件
#mybatis.mapper-locations=classpath:mappers/*xml
##指定Mybatis的实体目录
#mybatis.type-aliases-package=com.example.kokotaserver.mybatis.entity
#
## 应用服务 WEB 访问端口
#server.port=8080
#

spring:
  application:
    name: kokota-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://117.72.59.58:3306/kokota
    username: root
    password: a7f3e9d2c8b1a4f6e0d5c7b9a3e2f1d4c6b8a0e7f9d2c4b6a8e0f3d5c7b9a2e4
  output:
    ansi:
      enabled: always
  session:
    timeout: 1d

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    # 禁用自动驼峰转换，因为数据库字段已是驼峰写法
    map-underscore-to-camel-case: false
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除字段名(isDelete为实体类属性名称)
      logic-delete-value: 1 # 逻辑已删除值。可选，默认值为 1
      logic-not-delete-value: 0 # 逻辑未删除值。可选，默认值为 0
